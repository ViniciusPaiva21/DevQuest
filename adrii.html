<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #e4e4e7;
        }

        pre::-webkit-scrollbar,
        textarea::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        pre::-webkit-scrollbar-track,
        textarea::-webkit-scrollbar-track {
            background: #18181b;
            border-radius: 8px;
        }

        pre::-webkit-scrollbar-thumb,
        textarea::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 4px;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-green-700 selection:text-white overflow-x-hidden">

    <header class="w-full py-6 px-6 flex justify-between items-center border-b border-zinc-800/50 bg-zinc-950/50 backdrop-blur-sm sticky top-0 z-50">

            <div class="p-2 bg-zinc-900 rounded-lg border border-zinc-800 group-hover:border-green-700/50 transition-colors">
                <i data-lucide="database" class="text-green-600 w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-zinc-100 group-hover:text-green-300 transition-colors">
                    Dev<span class="text-green-700">Quest</span>
                </h1>
            </div>
        </div>

        <nav class="hidden md:flex gap-6 text-sm font-medium text-zinc-400">
            <a href="index.html" class="hover:text-green-400 transition-colors">Início</a>
            <a href="adrii.html" class="hover:text-green-500 transition-colors">ADRII</a>
        </nav>
    </header>

    <main class="flex-grow flex flex-col items-center px-4 py-12 relative w-full max-w-5xl mx-auto">
        <div class="pointer-events-none absolute top-0 left-1/4 w-96 h-96 bg-green-800/10 rounded-full blur-3xl -z-10 animate-pulse-slow"></div>

        <div class="text-center mb-8 z-10">
            <div class="inline-flex items-center justify-center p-3 bg-zinc-900/50 rounded-2xl border border-zinc-800 mb-4">
                <i data-lucide="database-zap" class="text-green-600 w-8 h-8"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-2 text-white">
                Quiz ADRII
            </h1>
            <p class="text-zinc-400">Aprenda até zerar os erros.</p>
        </div>

        <div class="w-full max-w-3xl mb-4 flex justify-end">
            <button
                id="toggle-discursive"
                onclick="toggleDiscursive()"
                class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-zinc-700 bg-zinc-900 text-sm text-zinc-300 hover:border-green-600 hover:text-white transition-colors"
            >
                <i data-lucide="message-square-text" class="w-4 h-4"></i>
                <span>Discursivas: ON</span>
            </button>
        </div>

        <div id="loading" class="text-green-500 font-bold text-xl animate-pulse">Aguarde, buscando dados...</div>

        <div id="quiz-container" class="w-full max-w-3xl z-10 hidden">
            <div id="top-status" class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div id="round-badge" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 text-sm text-zinc-300">
                    <i data-lucide="brain" class="w-4 h-4 text-green-500"></i>
                    <span>Rodada 1</span>
                </div>

                <div id="progress-badge" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 text-sm text-zinc-300">
                    <i data-lucide="target" class="w-4 h-4 text-emerald-400"></i>
                    <span>0 acertos</span>
                </div>
            </div>

            <div id="question-area" class="bg-zinc-900/60 border border-zinc-800 p-6 md:p-8 rounded-3xl shadow-2xl w-full overflow-visible"></div>

            <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-6 py-4 bg-white text-zinc-950 font-bold rounded-xl hover:bg-zinc-200 transition-colors shadow-lg transform active:scale-95">
                Próxima Pergunta ➡️
            </button>
        </div>

        <div id="final-screen" class="hidden w-full max-w-2xl text-center bg-zinc-900/60 border border-zinc-800 p-10 rounded-3xl shadow-2xl z-10">
            <h2 id="final-title" class="text-3xl font-bold text-white mb-4">Mandou bem! 🚀</h2>
            <p id="score-text" class="text-2xl text-green-500 font-bold mb-4"></p>
            <p id="final-detail" class="text-zinc-300 mb-8"></p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="location.reload()" class="px-8 py-3 bg-white text-zinc-950 font-bold rounded-xl hover:bg-zinc-200 transition-colors">
                    Jogar Novamente
                </button>
                <a href="index.html" class="px-8 py-3 bg-zinc-800 text-white font-bold rounded-xl hover:bg-zinc-700 transition-colors border border-zinc-700">
                    Voltar ao Início
                </a>
            </div>
        </div>
    </main>

    <footer class="w-full py-8 border-t border-zinc-800/50 bg-zinc-950 relative z-10 mt-auto">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <p class="text-zinc-500 text-sm flex items-center justify-center gap-1">
                Feito com <i data-lucide="coffee" class="text-amber-700 w-3 h-3"></i> por Vinicius
            </p>
        </div>
    </footer>

    <div class="fixed bottom-4 right-4 z-50 cursor-pointer group" onclick="handleCatClick()" title="Miau!">
        <div id="cat-bubble" class="absolute -top-12 -left-8 bg-white text-zinc-900 text-xs font-bold px-3 py-1 rounded-xl rounded-br-none transform transition-all duration-300 shadow-lg opacity-0 scale-90 translate-y-2 pointer-events-none">Miau! 🐾</div>
        <svg width="80" height="80" viewBox="0 0 100 100" id="cat-svg" class="transform transition-transform duration-500 group-hover:-translate-y-2">
            <path d="M30 80 Q30 40 60 40 Q90 40 90 80 L90 100 L30 100 Z" fill="#18181b" stroke="#27272a" stroke-width="2" />
            <circle cx="60" cy="45" r="25" fill="#18181b" stroke="#27272a" stroke-width="2" />
            <path d="M40 30 L35 10 L55 25 Z" fill="#18181b" stroke="#27272a" stroke-width="2" />
            <path d="M80 30 L85 10 L65 25 Z" fill="#18181b" stroke="#27272a" stroke-width="2" />
            <circle cx="50" cy="40" r="3" fill="#ef4444" class="animate-pulse" />
            <circle cx="70" cy="40" r="3" fill="#ef4444" class="animate-pulse" />
            <path d="M58 50 L62 50 L60 53 Z" fill="#e4e4e7" />
            <line x1="45" y1="52" x2="25" y2="50" stroke="#52525b" stroke-width="1" />
            <line x1="45" y1="55" x2="25" y2="58" stroke="#52525b" stroke-width="1" />
            <line x1="75" y1="52" x2="95" y2="50" stroke="#52525b" stroke-width="1" />
            <line x1="75" y1="55" x2="95" y2="58" stroke="#52525b" stroke-width="1" />
        </svg>
    </div>

    <script>
        lucide.createIcons();

        let allQuestions = [];
        let questions = [];
        let currentQuestion = 0;
        let score = 0;

        let wrongQuestions = [];
        let originalTotal = 0;
        let round = 1;
        let reviewMode = false;
        let firstRoundScore = 0;
        let totalAttempts = 0;

        let enableDiscursive = true;

        function shuffleArray(array) {
            const cloned = [...array];
            for (let i = cloned.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
            }
            return cloned;
        }

        function normalizeText(text) {
            return String(text || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .replace(/[^\w\s]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return "";
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function countMatchedKeywords(userAnswer, keywords) {
            const normalizedUser = normalizeText(userAnswer);
            let count = 0;

            for (const keyword of (keywords || [])) {
                const normalizedKeyword = normalizeText(keyword);
                if (normalizedKeyword && normalizedUser.includes(normalizedKeyword)) {
                    count++;
                }
            }

            return count;
        }

        function extractTechniques(answer, tecnicasValidas) {
            const normalized = normalizeText(answer);
            const found = [];

            for (const grupo of (tecnicasValidas || [])) {
                const variantes = Array.isArray(grupo) ? grupo : [grupo];

                const matched = variantes.some(variante => {
                    const termo = normalizeText(variante);
                    return termo && normalized.includes(termo);
                });

                if (matched) {
                    found.push(variantes[0]);
                }
            }

            return [...new Set(found)];
        }

        function hasExplanation(answer, techniquesFound, minPalavrasExplicacao = 5) {
            let textoSemTecnicas = normalizeText(answer);

            for (const tecnica of techniquesFound) {
                const termo = normalizeText(tecnica);
                if (termo) {
                    const escaped = termo.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                    const regex = new RegExp(`\\b${escaped}\\b`, "g");
                    textoSemTecnicas = textoSemTecnicas.replace(regex, "");
                }
            }

            const palavras = textoSemTecnicas
                .split(" ")
                .map(p => p.trim())
                .filter(Boolean);

            return palavras.length >= minPalavrasExplicacao;
        }

        function validateCriteriaDiscursiveAnswer(userAnswer, question) {
            const criterios = question.criterios || {};
            const tecnicasValidas = criterios.tecnicasValidas || [];
            const minTecnicas = criterios.minTecnicas || 2;
            const exigirExplicacao = criterios.exigirExplicacao ?? true;
            const minPalavrasExplicacao = criterios.minPalavrasExplicacao || 5;

            const normalized = normalizeText(userAnswer);

            if (!normalized) {
                return {
                    isCorrect: false,
                    feedback: "Resposta vazia."
                };
            }

            const tecnicasEncontradas = extractTechniques(userAnswer, tecnicasValidas);

            if (tecnicasEncontradas.length < minTecnicas) {
                return {
                    isCorrect: false,
                    feedback: `Você citou ${tecnicasEncontradas.length} técnica(s). O mínimo é ${minTecnicas}.`
                };
            }

            if (exigirExplicacao) {
                const explicou = hasExplanation(userAnswer, tecnicasEncontradas, minPalavrasExplicacao);

                if (!explicou) {
                    return {
                        isCorrect: false,
                        feedback: "Você citou técnicas válidas, mas faltou explicá-las minimamente."
                    };
                }
            }

            return {
                isCorrect: true,
                feedback: `Resposta aceita. Técnicas identificadas: ${tecnicasEncontradas.join(", ")}.`
            };
        }

        function validateSimpleDiscursiveAnswer(userAnswer, question) {
            const normalizedUser = normalizeText(userAnswer);

            if (!normalizedUser) {
                return {
                    isCorrect: false,
                    feedback: "Resposta vazia."
                };
            }

            const acceptedAnswers = (question.respostasAceitas || []).map(normalizeText);
            if (acceptedAnswers.includes(normalizedUser)) {
                return {
                    isCorrect: true,
                    feedback: "Resposta aceita por equivalência direta."
                };
            }

            const expected = normalizeText(question.respostaEsperada || "");
            if (expected && normalizedUser === expected) {
                return {
                    isCorrect: true,
                    feedback: "Resposta igual à esperada."
                };
            }

            const matchedKeywords = countMatchedKeywords(userAnswer, question.palavrasChave || []);
            const minKeywords = question.minPalavrasChave || 0;

            if (minKeywords > 0 && matchedKeywords >= minKeywords) {
                return {
                    isCorrect: true,
                    feedback: `Resposta aceita por palavras-chave (${matchedKeywords}/${minKeywords}).`
                };
            }

            return {
                isCorrect: false,
                feedback: "Resposta não atingiu os critérios mínimos."
            };
        }

        function validateDiscursiveAnswer(userAnswer, question) {
            if (question.criterios && question.criterios.tecnicasValidas) {
                return validateCriteriaDiscursiveAnswer(userAnswer, question);
            }

            return validateSimpleDiscursiveAnswer(userAnswer, question);
        }

        function filterQuestionsBySettings(list) {
            if (enableDiscursive) return [...list];
            return list.filter(q => q.tipo !== "discursiva");
        }

        function updateDiscursiveToggleUI() {
            const button = document.getElementById("toggle-discursive");
            const label = button.querySelector("span");

            if (enableDiscursive) {
                label.textContent = "Discursivas: ON";
                button.classList.remove("border-green-600", "text-green-400");
            } else {
                label.textContent = "Discursivas: OFF";
                button.classList.add("border-green-600", "text-green-400");
            }

            lucide.createIcons();
        }

        function updateTopStatus() {
            const roundBadge = document.getElementById("round-badge");
            const progressBadge = document.getElementById("progress-badge");

            roundBadge.innerHTML = `
                <i data-lucide="${reviewMode ? 'rotate-ccw' : 'brain'}" class="w-4 h-4 text-green-500"></i>
                <span>${reviewMode ? `Revisão - Rodada ${round}` : `Rodada ${round}`}</span>
            `;

            progressBadge.innerHTML = `
                <i data-lucide="target" class="w-4 h-4 text-emerald-400"></i>
                <span>${score} acerto${score === 1 ? '' : 's'} nesta rodada</span>
            `;

            lucide.createIcons();
        }

        function resetQuiz(filteredQuestions = null) {
            currentQuestion = 0;
            score = 0;
            wrongQuestions = [];
            round = 1;
            reviewMode = false;
            firstRoundScore = 0;
            totalAttempts = 0;

            questions = shuffleArray(filteredQuestions || filterQuestionsBySettings(allQuestions));
            originalTotal = questions.length;

            document.getElementById("final-screen").classList.add("hidden");

            if (questions.length > 0) {
                document.getElementById("loading").classList.add("hidden");
                document.getElementById("quiz-container").classList.remove("hidden");
                updateTopStatus();
                showQuestion();
            } else {
                document.getElementById("quiz-container").classList.add("hidden");
                document.getElementById("loading").classList.remove("hidden");
                document.getElementById("loading").innerText = enableDiscursive
                    ? "Nenhuma pergunta encontrada."
                    : "Nenhuma pergunta objetiva encontrada com discursivas desativadas.";
            }
        }

        function toggleDiscursive() {
            enableDiscursive = !enableDiscursive;
            updateDiscursiveToggleUI();
            resetQuiz();
        }

        async function loadQuestions() {
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch('perguntas.json');
                if (!response.ok) throw new Error(`Erro: ${response.status}`);

                const data = await response.json();
                allQuestions = Array.isArray(data.adrii) ? data.adrii : Array.isArray(data.arquiteturaDadosRelacionaisII) ? data.arquiteturaDadosRelacionaisII : Array.isArray(data.arquitetura_dados_relacionais_ii) ? data.arquitetura_dados_relacionais_ii : Array.isArray(data["arquitetura de dados relacionais ii"]) ? data["arquitetura de dados relacionais ii"] : [];

                if (allQuestions.length > 0) {
                    updateDiscursiveToggleUI();
                    resetQuiz();
                } else {
                    document.getElementById('loading').innerText = "Nenhuma pergunta encontrada.";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "Erro ao carregar JSON.";
            }
        }

        function renderQuestionHeader(q) {
            return `
                <div class="mb-6">
                    <div class="flex flex-wrap items-center gap-3 mb-4">
                        <span class="text-xs font-bold tracking-widest text-green-500 uppercase">
                            ${reviewMode
                                ? `Revisão • Questão ${currentQuestion + 1} de ${questions.length}`
                                : `Questão ${currentQuestion + 1} de ${questions.length}`
                            }
                        </span>

                        ${reviewMode ? `
                            <span class="text-[11px] font-bold uppercase tracking-wider px-3 py-1 rounded-full bg-green-500/10 text-green-300 border border-green-500/20">
                                Você já errou esta antes
                            </span>
                        ` : ""}
                    </div>

                    <h2 class="text-xl md:text-2xl font-bold text-white mt-2 leading-relaxed">${escapeHtml(q.titulo || "")}</h2>

                    <p class="text-zinc-300 mt-4 text-sm leading-relaxed whitespace-pre-line">${escapeHtml(q.descricao || '')}</p>

                    ${q.codigo ? `
                        <div class="my-6 rounded-xl overflow-hidden border border-zinc-700 shadow-2xl">
                            <div class="bg-zinc-800 px-4 py-2 text-xs text-zinc-400 flex gap-2 items-center border-b border-zinc-700">
                                <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                                <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                                <span class="ml-2 font-mono opacity-50">code</span>
                            </div>
                            <pre class="m-0 overflow-x-auto"><code class="language-css text-sm font-light leading-relaxed">${escapeHtml(q.codigo)}</code></pre>
                        </div>
                    ` : ''}

                    ${q.afirmacoes ? `
                        <div class="my-6 flex flex-col gap-2">
                            <span class="text-xs text-zinc-500 uppercase tracking-wider font-bold mb-2">Analise:</span>
                            ${q.afirmacoes.map(item => `
                                <div class="flex gap-4 p-3 rounded-lg bg-zinc-900/40 border border-zinc-800/50 hover:border-green-500/30 transition-colors">
                                    <span class="font-bold text-green-500 text-sm shrink-0 select-none pt-0.5">${escapeHtml(item.id)}</span>
                                    <span class="text-zinc-300 text-sm font-light leading-relaxed">${escapeHtml(item.texto)}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function showQuestion() {
            const container = document.getElementById('question-area');
            const nextBtn = document.getElementById('next-btn');
            const q = questions[currentQuestion];

            nextBtn.classList.add('hidden');

            let html = renderQuestionHeader(q);

            if (q.tipo === "discursiva") {
                html += `
                    <div class="mt-6">
                        <label for="discursive-answer" class="block text-sm font-semibold text-zinc-300 mb-2">
                            Sua resposta:
                        </label>

                        <textarea
                            id="discursive-answer"
                            rows="7"
                            class="w-full min-h-[140px] max-h-[320px] overflow-auto rounded-xl border border-zinc-700 bg-zinc-950/70 p-4 text-zinc-200 outline-none focus:border-green-600 resize-y"
                            placeholder="Digite sua resposta aqui..."
                        ></textarea>

                        <button
                            id="submit-discursive-btn"
                            class="w-full mt-4 py-4 bg-white text-zinc-950 font-bold rounded-xl hover:bg-zinc-200 transition-colors shadow-lg active:scale-[0.99]"
                            onclick="checkDiscursiveAnswer()"
                        >
                            Responder ✍️
                        </button>
                    </div>
                `;

                container.innerHTML = html;
                hljs.highlightAll();
                lucide.createIcons();
                return;
            }

            html += `<div id="options-box" class="flex flex-col gap-3"></div>`;
            container.innerHTML = html;

            const optionsBox = document.getElementById('options-box');
            const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
            const shuffledOptions = shuffleArray([...(q.opcoes || [])]);

            shuffledOptions.forEach((opcaoTexto, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border border-zinc-800 bg-zinc-950/50 hover:bg-zinc-900 hover:border-green-500/50 transition-all duration-200 text-zinc-300 font-medium group flex items-start justify-start gap-3 overflow-hidden";

                const textoLimpo = escapeHtml(opcaoTexto);

                btn.innerHTML = `
                    <span class="font-bold text-green-700 group-hover:text-green-500 transition-colors shrink-0">${letters[index]})</span>
                    <span class="group-hover:text-white transition-colors font-light leading-relaxed whitespace-pre-line break-words">${textoLimpo}</span>
                `;

                btn.onclick = () => checkAnswer(btn, opcaoTexto, q.resposta);
                optionsBox.appendChild(btn);
            });

            hljs.highlightAll();
            lucide.createIcons();
        }

        function checkAnswer(selectedBtn, selectedText, correctText) {
            totalAttempts++;

            const allOptions = document.querySelectorAll('#options-box button');
            const nextBtn = document.getElementById('next-btn');

            const cleanSelected = normalizeText(selectedText);
            const cleanCorrect = normalizeText(correctText);
            const isCorrect = cleanSelected === cleanCorrect;

            allOptions.forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('hover:bg-zinc-900', 'hover:border-green-500/50');
                btn.classList.add('cursor-default', 'opacity-50');
            });

            selectedBtn.classList.remove('opacity-50');

            if (isCorrect) {
                selectedBtn.classList.remove('bg-zinc-950/50', 'border-zinc-800');
                selectedBtn.classList.add('bg-emerald-500/10', 'border-emerald-500');
                selectedBtn.querySelectorAll('span').forEach(s => s.classList.add('text-emerald-400'));
                selectedBtn.querySelector('span:first-child').classList.remove('text-green-700');
                score++;
            } else {
                wrongQuestions.push(questions[currentQuestion]);

                selectedBtn.classList.remove('bg-zinc-950/50', 'border-zinc-800');
                selectedBtn.classList.add('bg-red-500/10', 'border-red-500');
                selectedBtn.querySelectorAll('span').forEach(s => s.classList.add('text-red-400'));
                selectedBtn.querySelector('span:first-child').classList.remove('text-green-700');

                allOptions.forEach(btn => {
                    const btnText = normalizeText(btn.querySelector('span:last-child')?.innerText || "");
                    if (btnText === cleanCorrect) {
                        btn.classList.remove('opacity-50', 'bg-zinc-950/50', 'border-zinc-800');
                        btn.classList.add('bg-emerald-500/10', 'border-emerald-500');
                        btn.querySelectorAll('span').forEach(s => s.classList.add('text-emerald-400'));
                        btn.querySelector('span:first-child').classList.remove('text-green-700');
                    }
                });
            }

            updateTopStatus();
            nextBtn.classList.remove('hidden');
        }

        function checkDiscursiveAnswer() {
            totalAttempts++;

            const q = questions[currentQuestion];
            const textarea = document.getElementById("discursive-answer");
            const submitBtn = document.getElementById("submit-discursive-btn");
            const nextBtn = document.getElementById("next-btn");

            const result = validateDiscursiveAnswer(textarea.value, q);

            textarea.disabled = true;
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-50", "cursor-default");

            let feedback = document.getElementById("discursive-feedback");
            if (!feedback) {
                feedback = document.createElement("div");
                feedback.id = "discursive-feedback";
                feedback.className = "mt-4 rounded-xl border p-4 text-sm leading-relaxed";
                textarea.parentElement.appendChild(feedback);
            }

            if (result.isCorrect) {
                score++;
                feedback.className = "mt-4 rounded-xl border border-emerald-500 bg-emerald-500/10 p-4 text-sm leading-relaxed text-emerald-300";
                feedback.innerHTML = `
                    <strong>Correto.</strong><br>
                    ${escapeHtml(result.feedback)}
                `;
            } else {
                wrongQuestions.push(questions[currentQuestion]);

                let modeloHtml = "";

                if (Array.isArray(q.respostaModelo) && q.respostaModelo.length > 0) {
                    modeloHtml = `
                        <br><br>
                        <strong>Modelo esperado:</strong><br>
                        ${q.respostaModelo.map(item => escapeHtml(item)).join("<br>")}
                    `;
                } else if (q.respostaEsperada) {
                    modeloHtml = `
                        <br><br>
                        <strong>Resposta esperada:</strong><br>
                        ${escapeHtml(q.respostaEsperada)}
                    `;
                }

                feedback.className = "mt-4 rounded-xl border border-red-500 bg-red-500/10 p-4 text-sm leading-relaxed text-red-300";
                feedback.innerHTML = `
                    <strong>Incorreto.</strong><br>
                    ${escapeHtml(result.feedback)}
                    ${modeloHtml}
                `;
            }

            updateTopStatus();
            nextBtn.classList.remove("hidden");
        }

        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
                return;
            }

            if (round === 1) {
                firstRoundScore = score;
            }

            const filteredWrongQuestions = filterQuestionsBySettings(wrongQuestions);

            if (filteredWrongQuestions.length > 0) {
                questions = shuffleArray(filteredWrongQuestions);
                wrongQuestions = [];
                currentQuestion = 0;
                score = 0;
                round++;
                reviewMode = true;
                showQuestion();
                return;
            }

            showResults();
        }

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');

            const extraRounds = round - 1;
            document.getElementById('final-title').innerText = "Agora sim: zerou tudo. 🚀";
            document.getElementById('score-text').innerText = `Primeira rodada: ${firstRoundScore} de ${originalTotal} acertos.`;
            document.getElementById('final-detail').innerText =
                `Você revisou as erradas até acertar tudo. Foram ${totalAttempts} tentativas no total e ${extraRounds} rodada${extraRounds === 1 ? "" : "s"} extra.`;
        }

        function handleCatClick() {
            const bubble = document.getElementById('cat-bubble');
            const catSvg = document.getElementById('cat-svg');
            bubble.classList.remove('opacity-0', 'scale-90', 'translate-y-2');
            bubble.classList.add('opacity-100', 'scale-100', 'translate-y-0');
            catSvg.classList.add('translate-y-2');
            setTimeout(() => {
                bubble.classList.remove('opacity-100', 'scale-100', 'translate-y-0');
                bubble.classList.add('opacity-0', 'scale-90', 'translate-y-2');
                catSvg.classList.remove('translate-y-2');
            }, 1000);
        }

        loadQuestions();
    </script>
</body>
</html>
